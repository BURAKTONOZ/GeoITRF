<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>GeoITRF - Mobil Terminal</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        :root {
            --bg-dark: #0f172a;
            --panel-bg: #1e293b;
            --border-color: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #10b981; 
            --danger: #ef4444;
            --primary: #3b82f6;
        }

        body, html { 
            margin: 0; padding: 0; 
            width: 100%; height: 100%; 
            font-family: 'Poppins', sans-serif; 
            overflow: hidden; 
            position: fixed; 
            background-color: #000;
        }

        #map { width: 100vw; height: 100vh; z-index: 1; }

        /* Harita üzerindeki butonları üst menünün altına itme */
        .leaflet-top { margin-top: 70px !important; }

        /* Yüzen Üst Çubuk */
        .top-bar {
            position: absolute; top: 15px; left: 15px; right: 15px; z-index: 1000;
            background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            padding: 12px 20px; border-radius: 15px; border: 1px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: center; color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .top-bar h1 { font-size: 1rem; margin: 0; font-weight: 700; letter-spacing: 0.5px; }
        .gps-status { font-size: 0.8rem; font-weight: 600; color: var(--accent); display: flex; align-items: center; gap: 5px; }
        .blink { animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0.3; } }

        /* Konumuma Git Butonu (Google Maps stili) */
        .locate-btn {
            position: absolute;
            top: 155px; /* Zoom butonlarının altına denk gelecek */
            right: 10px;
            z-index: 1000;
            background-color: #fff;
            border: 2px solid rgba(0,0,0,0.2);
            border-radius: 4px;
            width: 34px;
            height: 34px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 1px 5px rgba(0,0,0,0.65);
            color: #444;
            font-size: 16px;
        }
        .locate-btn:active { background-color: #f4f4f4; }

        /* ALT PANEL */
        .bottom-panel {
            position: absolute; bottom: 0; left: 0; width: 100%; z-index: 1000;
            background: var(--panel-bg);
            border-radius: 25px 25px 0 0;
            box-shadow: 0 -5px 25px rgba(0,0,0,0.5);
            display: flex; flex-direction: column;
            border-top: 1px solid rgba(255,255,255,0.15);
        }

        .drawer-handle {
            width: 40px; height: 5px; background: rgba(255,255,255,0.2);
            border-radius: 5px; margin: 10px auto;
        }

        .panel-static { padding: 0 20px 20px 20px; }

        .coords-row {
            display: flex; justify-content: space-between;
            color: var(--primary); font-size: 0.9rem; font-weight: 600;
            background: rgba(0,0,0,0.2); padding: 10px 15px; border-radius: 10px; margin-bottom: 15px;
        }

        .input-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .input-row input {
            flex: 1; padding: 12px 15px; border-radius: 12px; border: 1px solid var(--border-color);
            background: rgba(255, 255, 255, 0.05); color: white; font-size: 0.9rem; outline: none;
        }
        .input-row button {
            background: var(--accent); color: white; border: none; padding: 0 20px;
            border-radius: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 5px;
        }

        .toggle-btn {
            width: 100%; background: transparent; border: 1px solid var(--border-color); color: var(--text-muted);
            padding: 12px; border-radius: 12px; font-weight: 600; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
        }
        .toggle-btn:active { background: rgba(255,255,255,0.05); }

        .panel-collapsible {
            max-height: 0; 
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            background: rgba(0,0,0,0.15);
        }
        .panel-collapsible.open { max-height: 45vh; }

        .points-list {
            padding: 15px 20px; max-height: 45vh; overflow-y: auto; -webkit-overflow-scrolling: touch; 
        }

        .point-card {
            background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border-color);
            border-radius: 12px; padding: 12px; margin-bottom: 10px; color: white;
            display: flex; justify-content: space-between; align-items: center;
        }
        .point-info h4 { margin: 0 0 5px 0; font-size: 0.95rem; }
        .point-info p { margin: 0; font-size: 0.75rem; color: var(--text-muted); }
        .point-actions { display: flex; gap: 5px; }
        .btn-icon {
            width: 35px; height: 35px; border-radius: 8px; border: none;
            display: flex; justify-content: center; align-items: center; color: white; cursor: pointer;
        }
        .btn-go { background: rgba(59, 130, 246, 0.2); color: var(--primary); }
        .btn-del { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
    </style>
</head>
<body>

    <div class="top-bar">
        <h1>GeoITRF</h1>
        <div class="gps-status"><i class="fas fa-satellite blink"></i> Aktif</div>
    </div>

    <button class="locate-btn" onclick="goToMyLocation()" title="Konumuma Git">
        <i class="fas fa-crosshairs"></i>
    </button>

    <div id="map"></div>

    <div class="bottom-panel">
        <div class="drawer-handle"></div>
        <div class="panel-static">
            <div class="coords-row">
                <span>E: <span id="lat">...</span></span>
                <span>B: <span id="lon">...</span></span>
            </div>
            <div class="input-row">
                <input type="text" id="point-name" placeholder="Nokta Adı Girin (Örn: N1)">
                <button onclick="saveCurrentLocation()"><i class="fas fa-save"></i></button>
            </div>
            <button class="toggle-btn" onclick="toggleList()">
                <span><i class="fas fa-list-ul"></i> Kayıtlı Noktalar (<span id="point-count">0</span>)</span>
                <i class="fas fa-chevron-down" id="toggle-icon"></i>
            </button>
        </div>

        <div class="panel-collapsible" id="collapsible-area">
            <div class="points-list" id="points-list">
                <div style="text-align:center; color:#94a3b8; font-size:0.85rem; padding: 20px 0;">
                    Kayıtlı noktanız bulunmuyor.
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        var map = L.map('map', { zoomControl: false }).setView([39.92, 32.85], 2); 
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            maxZoom: 19
        }).addTo(map);
        
        L.control.zoom({ position: 'topright' }).addTo(map);

        var userMarker = null;
        var firstLocationFound = false;
        var currentLat = null;
        var currentLon = null;
        var savedPoints = [];
        var pointMarkers = {};
        var pointIdCounter = 0;

        if ('geolocation' in navigator) {
            navigator.geolocation.watchPosition(function(position) {
                currentLat = position.coords.latitude;
                currentLon = position.coords.longitude;

                document.getElementById('lat').innerText = currentLat.toFixed(5);
                document.getElementById('lon').innerText = currentLon.toFixed(5);

                var newLocation = new L.LatLng(currentLat, currentLon);

                if (userMarker) {
                    userMarker.setLatLng(newLocation);
                } else {
                    userMarker = L.circleMarker(newLocation, {
                        color: '#10b981', fillColor: '#10b981', fillOpacity: 0.8, radius: 8, weight: 2
                    }).addTo(map);
                }

                if (!firstLocationFound) {
                    map.setView(newLocation, 18);
                    firstLocationFound = true;
                }
            }, function(error) {
                console.warn('Konum Hatası:', error.message);
            }, { enableHighAccuracy: true, maximumAge: 0 });
        }

        // Anlık konuma odaklanma fonksiyonu
        function goToMyLocation() {
            if (currentLat && currentLon) {
                map.setView([currentLat, currentLon], 19);
            } else {
                alert("Konum aranıyor, lütfen bekleyin...");
            }
        }

        function toggleList() {
            var panel = document.getElementById("collapsible-area");
            var icon = document.getElementById("toggle-icon");
            if (panel.classList.contains("open")) {
                panel.classList.remove("open");
                icon.className = "fas fa-chevron-down";
            } else {
                panel.classList.add("open");
                icon.className = "fas fa-chevron-up";
            }
        }

        function saveCurrentLocation() {
            if (currentLat === null || currentLon === null) {
                alert("GPS bağlantısı bekleniyor..."); return;
            }
            var nameInput = document.getElementById("point-name");
            var pointName = nameInput.value.trim();
            if (pointName === "") {
                alert("Nokta adı girin!"); nameInput.focus(); return;
            }

            var id = pointIdCounter++;
            var marker = L.marker([currentLat, currentLon]).addTo(map).bindPopup("<b>" + pointName + "</b>");
            pointMarkers[id] = marker;

            savedPoints.push({ id: id, name: pointName, lat: currentLat, lon: currentLon });
            nameInput.value = "";
            
            // Listeyi otomatik AÇMAYI iptal ettik (sadece UI'ı arka planda güncelliyoruz)
            updateListUI();
        }

        function zoomToPoint(lat, lon) {
            map.setView([lat, lon], 19);
            toggleList(); // Listeden bir yere giderken haritayı görmek için listeyi kapatır
        }

        function deletePoint(id) {
            if(pointMarkers[id]) { map.removeLayer(pointMarkers[id]); delete pointMarkers[id]; }
            savedPoints = savedPoints.filter(p => p.id !== id);
            updateListUI();
        }

        function updateListUI() {
            var listDiv = document.getElementById("points-list");
            document.getElementById("point-count").innerText = savedPoints.length;

            if (savedPoints.length === 0) {
                listDiv.innerHTML = '<div style="text-align:center; color:#94a3b8; font-size:0.85rem; padding: 20px 0;">Kayıtlı noktanız bulunmuyor.</div>';
                return;
            }

            listDiv.innerHTML = "";
            savedPoints.forEach(function(point) {
                listDiv.innerHTML += `
                    <div class="point-card">
                        <div class="point-info">
                            <h4><i class="fas fa-map-pin" style="color:var(--primary);"></i> ${point.name}</h4>
                            <p>${point.lat.toFixed(5)}, ${point.lon.toFixed(5)}</p>
                        </div>
                        <div class="point-actions">
                            <button class="btn-icon btn-go" onclick="zoomToPoint(${point.lat}, ${point.lon})"><i class="fas fa-crosshairs"></i></button>
                            <button class="btn-icon btn-del" onclick="deletePoint(${point.id})"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
