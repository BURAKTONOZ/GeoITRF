<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>GeoITRF - CBS Veri Terminali</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        :root {
            --bg-dark: #0f172a;
            --panel-bg: #1e293b;
            --border-color: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #10b981; /* Zümrüt Yeşili */
            --accent-hover: #059669;
            --danger: #ef4444;
            --primary: #3b82f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body { 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            height: 100vh; 
            display: flex; 
            overflow: hidden; /* Sayfanın genel kaymasını engelle */
        }

        /* Ana Taşıyıcı: Yan Panel + Harita */
        .app-container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* --- SOL PANEL (SİDEBAR) --- */
        .sidebar {
            width: 380px;
            background-color: var(--panel-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            z-index: 10;
            box-shadow: 2px 0 15px rgba(0,0,0,0.5);
        }

        /* Üst Başlık */
        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .sidebar-header i { font-size: 24px; color: var(--accent); }
        .sidebar-header h1 { font-size: 1.2rem; font-weight: 600; margin: 0; }
        .sidebar-header p { font-size: 0.8rem; color: var(--text-muted); margin-top: 2px; }

        /* Anlık Konum Kartı */
        .live-location-card {
            margin: 20px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            border-radius: 12px;
        }
        .live-location-card h3 { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 10px; display: flex; justify-content: space-between;}
        .live-location-card h3 span { color: var(--danger); font-size: 0.8rem; animation: blink 2s infinite; }
        .coord-row { display: flex; justify-content: space-between; font-size: 0.95rem; margin-bottom: 5px; font-weight: 600; color: var(--primary);}
        
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        /* Veri Giriş Alanı */
        .input-section {
            padding: 0 20px 20px 20px;
            border-bottom: 1px solid var(--border-color);
        }
        .input-group { display: flex; flex-direction: column; gap: 10px; }
        .input-group input {
            padding: 12px 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-size: 0.9rem;
            outline: none;
            transition: 0.3s;
        }
        .input-group input:focus { border-color: var(--accent); background: rgba(255, 255, 255, 0.1); }
        .btn-save {
            background: var(--accent); color: white; border: none; padding: 12px;
            border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.3s;
            display: flex; justify-content: center; align-items: center; gap: 8px;
        }
        .btn-save:hover { background: var(--accent-hover); }

        /* Kayıtlı Noktalar Listesi */
        .points-list-header { padding: 20px 20px 10px 20px; font-size: 0.9rem; font-weight: 600; color: var(--text-muted); display: flex; justify-content: space-between; }
        .points-container {
            flex: 1;
            overflow-y: auto;
            padding: 0 20px 20px 20px;
        }
        
        /* Kaydırma Çubuğu Özelleştirme */
        .points-container::-webkit-scrollbar { width: 6px; }
        .points-container::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }

        .point-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            transition: 0.2s;
        }
        .point-card:hover { border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.06); }
        .point-title { font-weight: 600; font-size: 0.95rem; margin-bottom: 5px; color: white;}
        .point-coords { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 12px; }
        .point-actions { display: flex; gap: 8px; }
        .btn-action {
            flex: 1; padding: 8px; border: none; border-radius: 6px; font-size: 0.8rem; cursor: pointer; font-weight: 600; transition: 0.3s;
        }
        .btn-go { background: rgba(59, 130, 246, 0.2); color: var(--primary); }
        .btn-go:hover { background: rgba(59, 130, 246, 0.4); }
        .btn-del { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
        .btn-del:hover { background: rgba(239, 68, 68, 0.4); }

        /* --- SAĞ PANEL (HARİTA) --- */
        .map-wrapper {
            flex: 1;
            position: relative;
        }
        #map { width: 100%; height: 100%; z-index: 1; }

        /* Mobil Görünüm (Altlı Üstlü) */
        @media (max-width: 768px) {
            .app-container { flex-direction: column; }
            .map-wrapper { height: 45vh; flex: none; order: 1; } /* Harita Üstte */
            .sidebar { width: 100%; height: 55vh; order: 2; border-right: none; border-top: 1px solid var(--border-color); box-shadow: 0 -5px 15px rgba(0,0,0,0.5); }
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-satellite-dish"></i>
                <div>
                    <h1>GeoITRF</h1>
                    <p>CBS Veri Terminali</p>
                </div>
            </div>

            <div class="live-location-card">
                <h3>GPS Durumu <span><i class="fas fa-circle"></i> Canlı</span></h3>
                <div class="coord-row"><span>Enlem:</span> <span id="lat">Bağlanıyor...</span></div>
                <div class="coord-row"><span>Boylam:</span> <span id="lon">Bağlanıyor...</span></div>
            </div>

            <div class="input-section">
                <div class="input-group">
                    <input type="text" id="point-name" placeholder="Nokta Adı (Örn: P-101)">
                    <button class="btn-save" onclick="saveCurrentLocation()">
                        <i class="fas fa-map-pin"></i> Noktayı Kaydet
                    </button>
                </div>
            </div>

            <div class="points-list-header">
                <span>Kayıtlı Noktalar</span>
                <span id="point-count">0</span>
            </div>
            
            <div class="points-container" id="points-list">
                <div style="text-align:center; color:var(--text-muted); font-size:0.85rem; margin-top:20px;">
                    <i class="fas fa-folder-open" style="font-size:2rem; margin-bottom:10px; opacity:0.5;"></i><br>
                    Sistemde kayıtlı nokta bulunmuyor.
                </div>
            </div>
        </aside>

        <main class="map-wrapper">
            <div id="map"></div>
        </main>

    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // Harita Başlatma
        var map = L.map('map').setView([39.92, 32.85], 2); 
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            maxZoom: 19, attribution: '© Esri & GeoITRF'
        }).addTo(map);

        var userMarker = null;
        var firstLocationFound = false;
        var currentLat = null;
        var currentLon = null;
        var savedPoints = [];
        var pointMarkers = {};
        var pointIdCounter = 0;

        // Anlık Konum Takibi
        if ('geolocation' in navigator) {
            navigator.geolocation.watchPosition(function(position) {
                currentLat = position.coords.latitude;
                currentLon = position.coords.longitude;

                document.getElementById('lat').innerText = currentLat.toFixed(6);
                document.getElementById('lon').innerText = currentLon.toFixed(6);

                var newLocation = new L.LatLng(currentLat, currentLon);

                if (userMarker) {
                    userMarker.setLatLng(newLocation);
                } else {
                    userMarker = L.circleMarker(newLocation, {
                        color: '#10b981', fillColor: '#10b981', fillOpacity: 0.8, radius: 7, weight: 2
                    }).addTo(map).bindPopup("Mevcut Konumunuz");
                }

                if (!firstLocationFound) {
                    map.setView(newLocation, 18);
                    firstLocationFound = true;
                }

            }, function(error) {
                console.warn('Konum Hatası:', error.message);
                document.getElementById('lat').innerText = "Hata!";
                document.getElementById('lon').innerText = "Hata!";
            }, { enableHighAccuracy: true, maximumAge: 0 });
        }

        // Nokta Kaydetme
        function saveCurrentLocation() {
            if (currentLat === null || currentLon === null) {
                alert("GPS bağlantısı bekleniyor...");
                return;
            }

            var nameInput = document.getElementById("point-name");
            var pointName = nameInput.value.trim();
            
            if (pointName === "") {
                alert("Lütfen bir nokta adı girin!");
                nameInput.focus();
                return;
            }

            var id = pointIdCounter++;
            
            // Haritaya Pin Ekle
            var marker = L.marker([currentLat, currentLon]).addTo(map).bindPopup("<b>" + pointName + "</b>");
            pointMarkers[id] = marker;

            savedPoints.push({ id: id, name: pointName, lat: currentLat, lon: currentLon });

            nameInput.value = "";
            updateListUI();
        }

        function zoomToPoint(lat, lon) {
            map.setView([lat, lon], 19);
        }

        function deletePoint(id) {
            if(pointMarkers[id]) {
                map.removeLayer(pointMarkers[id]);
                delete pointMarkers[id];
            }
            savedPoints = savedPoints.filter(p => p.id !== id);
            updateListUI();
        }

        function updateListUI() {
            var listDiv = document.getElementById("points-list");
            document.getElementById("point-count").innerText = savedPoints.length;

            if (savedPoints.length === 0) {
                listDiv.innerHTML = `
                <div style="text-align:center; color:var(--text-muted); font-size:0.85rem; margin-top:20px;">
                    <i class="fas fa-folder-open" style="font-size:2rem; margin-bottom:10px; opacity:0.5;"></i><br>
                    Sistemde kayıtlı nokta bulunmuyor.
                </div>`;
                return;
            }

            listDiv.innerHTML = "";
            savedPoints.forEach(function(point) {
                listDiv.innerHTML += `
                    <div class="point-card">
                        <div class="point-title"><i class="fas fa-map-marker-alt" style="color:var(--primary); margin-right:5px;"></i> ${point.name}</div>
                        <div class="point-coords">E: ${point.lat.toFixed(6)} | B: ${point.lon.toFixed(6)}</div>
                        <div class="point-actions">
                            <button class="btn-action btn-go" onclick="zoomToPoint(${point.lat}, ${point.lon})"><i class="fas fa-search-location"></i> Git</button>
                            <button class="btn-action btn-del" onclick="deletePoint(${point.id})"><i class="fas fa-trash-alt"></i> Sil</button>
                        </div>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
