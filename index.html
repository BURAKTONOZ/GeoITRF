<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>GeoITRF - Mobil Terminal</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>

    <style>
        :root {
            --bg-dark: #0f172a;
            --panel-bg: #1e293b;
            --border-color: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #10b981; 
            --danger: #ef4444;
            --primary: #3b82f6;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'Poppins', sans-serif; overflow: hidden; position: fixed; background-color: #000;
        }

        #map { width: 100vw; height: 100vh; z-index: 1; }
        
        /* ---------------- DÜZELTİLEN KISIM 1 ---------------- */
        .leaflet-top { margin-top: 140px !important; } 

        .top-bar {
            position: absolute; top: 15px; left: 15px; right: 15px; z-index: 1000;
            background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            padding: 15px; border-radius: 15px; border: 1px solid var(--border-color);
            display: flex; flex-direction: column; gap: 10px; color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
        
        .top-header { 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 8px;
        }
        .top-header h1 { font-size: 1.1rem; margin: 0; font-weight: 700; color: var(--accent); letter-spacing: 0.5px;}
        .gps-status { font-size: 0.8rem; font-weight: 600; color: #cbd5e1; display: flex; align-items: center; gap: 6px; }
        .gps-status span { color: var(--accent); }
        .blink { animation: blinker 1.5s linear infinite; color: var(--accent); }
        @keyframes blinker { 50% { opacity: 0.3; } }

        .live-data-container { display: flex; justify-content: space-between; gap: 10px; }
        .live-col { flex: 1; display: flex; flex-direction: column; }
        .live-col:last-child { text-align: right; }
        .live-label { color: var(--text-muted); font-size: 0.65rem; text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px; margin-bottom: 3px;}
        .live-val { font-family: monospace; font-size: 0.85rem; font-weight: 600; color: #fff; line-height: 1.3;}
        .live-val span { color: var(--primary); }

        /* ---------------- DÜZELTİLEN KISIM 2 ---------------- */
        .locate-btn {
            position: absolute; top: 220px; right: 10px; z-index: 1000;
            background-color: #fff; border: 2px solid rgba(0,0,0,0.2); border-radius: 4px;
            width: 34px; height: 34px; display: flex; justify-content: center; align-items: center;
            cursor: pointer; box-shadow: 0 1px 5px rgba(0,0,0,0.65); color: #444; font-size: 16px;
        }
        .locate-btn:active { background-color: #f4f4f4; }

        .bottom-panel {
            position: absolute; bottom: 0; left: 0; width: 100%; z-index: 1000;
            background: var(--panel-bg); border-radius: 25px 25px 0 0;
            box-shadow: 0 -5px 25px rgba(0,0,0,0.5); display: flex; flex-direction: column;
            border-top: 1px solid rgba(255,255,255,0.15);
        }

        .drawer-handle { width: 40px; height: 5px; background: rgba(255,255,255,0.2); border-radius: 5px; margin: 10px auto; }
        .panel-static { padding: 0 20px 20px 20px; }

        .input-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .input-row input {
            flex: 1; padding: 12px 15px; border-radius: 12px; border: 1px solid var(--border-color);
            background: rgba(255, 255, 255, 0.05); color: white; font-size: 0.9rem; outline: none;
        }
        .input-row button {
            background: var(--accent); color: white; border: none; padding: 0 20px;
            border-radius: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; width: 60px;
            transition: 0.2s;
        }
        .input-row button:active { transform: scale(0.95); background: #059669; }

        .toggle-btn {
            width: 100%; background: transparent; border: 1px solid var(--border-color); color: var(--text-muted);
            padding: 12px; border-radius: 12px; font-weight: 600; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
        }

        .panel-collapsible {
            max-height: 0; overflow: hidden; transition: max-height 0.4s cubic-bezier(0.25, 1, 0.5, 1); background: rgba(0,0,0,0.15);
        }
        .panel-collapsible.open { max-height: 45vh; }
        .points-list { padding: 15px 20px; max-height: 45vh; overflow-y: auto; -webkit-overflow-scrolling: touch; }

        .point-card {
            background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border-color);
            border-radius: 12px; padding: 15px 12px; margin-bottom: 10px; color: white;
            display: flex; justify-content: space-between; align-items: center;
        }
        .point-info h4 { margin: 0 0 8px 0; font-size: 1rem; display:flex; align-items:center; gap:8px;}
        .point-info .dom-badge { font-size: 0.7rem; background: var(--primary); padding: 2px 6px; border-radius: 4px; color: #fff;}
        .itrf-coords { font-size: 0.95rem; font-weight: 600; color: #fff; margin: 0 0 2px 0; letter-spacing: 0.5px;}
        .itrf-coords span { color: var(--accent); }
        .wgs-coords { margin: 5px 0 0 0; font-size: 0.75rem; color: var(--text-muted); }
        
        .point-actions { display: flex; flex-direction: column; gap: 8px; }
        .btn-icon {
            width: 38px; height: 38px; border-radius: 8px; border: none;
            display: flex; justify-content: center; align-items: center; color: white; cursor: pointer; font-size: 1.1rem;
        }
        .btn-go { background: rgba(59, 130, 246, 0.2); color: var(--primary); }
        .btn-del { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="top-header">
            <h1>GeoITRF</h1>
            <div class="gps-status">
                <i class="fas fa-satellite blink"></i> 
                Hassasiyet: <span id="accuracy">Bekleniyor</span>
            </div>
        </div>
        
        <div class="live-data-container">
            <div class="live-col">
                <span class="live-label">WGS84 (E / B)</span>
                <span class="live-val">E: <span id="live-lat">...</span></span>
                <span class="live-val">B: <span id="live-lon">...</span></span>
            </div>
            <div class="live-col">
                <span class="live-label" id="dom-label">ITRF96</span>
                <span class="live-val">Y: <span id="live-y">...</span></span>
                <span class="live-val">X: <span id="live-x">...</span></span>
            </div>
        </div>
    </div>

    <button class="locate-btn" onclick="goToMyLocation()" title="Konumuma Git">
        <i class="fas fa-crosshairs"></i>
    </button>

    <div id="map"></div>

    <div class="bottom-panel">
        <div class="drawer-handle"></div>
        <div class="panel-static">
            <div class="input-row">
                <input type="text" id="point-name" placeholder="Nokta Adı Girin (Örn: P1)">
                <button id="save-btn" onclick="saveCurrentLocation()"><i class="fas fa-save"></i></button>
            </div>
            <button class="toggle-btn" onclick="toggleList()">
                <span><i class="fas fa-list-ul"></i> Kayıtlı Noktalar (<span id="point-count">0</span>)</span>
                <i class="fas fa-chevron-down" id="toggle-icon"></i>
            </button>
        </div>

        <div class="panel-collapsible" id="collapsible-area">
            <div class="points-list" id="points-list">
                <div style="text-align:center; color:#94a3b8; font-size:0.85rem; padding: 20px 0;">
                    Kayıtlı noktanız bulunmuyor.
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        var map = L.map('map', { zoomControl: false }).setView([39.92, 32.85], 2); 
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19 }).addTo(map);
        L.control.zoom({ position: 'topright' }).addTo(map);

        var userMarker = null;
        var firstLocationFound = false;
        
        var currentLat = null;
        var currentLon = null;
        var currentX = null;
        var currentY = null;
        var currentDOM = null;
        
        var savedPoints = [];
        var pointMarkers = {};
        var pointIdCounter = 0;

        function calculateITRF(lat, lon) {
            let dom = Math.round(lon / 3) * 3;
            let projString = `+proj=tmerc +lat_0=0 +lon_0=${dom} +k=1 +x_0=500000 +y_0=0 +ellps=GRS80 +towgs84=0,0,0,0,0,0,0 +units=m +no_defs`;
            let result = proj4('WGS84', projString, [lon, lat]);
            return { y: result[0], x: result[1], dom: dom };
        }

        if ('geolocation' in navigator) {
            navigator.geolocation.watchPosition(function(position) {
                currentLat = position.coords.latitude;
                currentLon = position.coords.longitude;
                let acc = position.coords.accuracy;

                document.getElementById('live-lat').innerText = currentLat.toFixed(5);
                document.getElementById('live-lon').innerText = currentLon.toFixed(5);
                document.getElementById('accuracy').innerText = "± " + Math.round(acc) + "m";

                let itrf = calculateITRF(currentLat, currentLon);
                currentY = itrf.y;
                currentX = itrf.x;
                currentDOM = itrf.dom;

                document.getElementById('dom-label').innerText = `ITRF96 (DOM ${currentDOM})`;
                document.getElementById('live-y').innerText = currentY.toFixed(3);
                document.getElementById('live-x').innerText = currentX.toFixed(3);

                var newLocation = new L.LatLng(currentLat, currentLon);

                if (userMarker) {
                    userMarker.setLatLng(newLocation);
                } else {
                    userMarker = L.circleMarker(newLocation, {
                        color: '#10b981', fillColor: '#10b981', fillOpacity: 0.8, radius: 8, weight: 2
                    }).addTo(map);
                }

                if (!firstLocationFound) {
                    map.setView(newLocation, 18);
                    firstLocationFound = true;
                }
            }, function(error) {
                console.warn('Konum Hatası:', error.message);
                document.getElementById('accuracy').innerText = "Hata!";
            }, { enableHighAccuracy: true, maximumAge: 0 });
        }

        function goToMyLocation() {
            if (currentLat && currentLon) { map.setView([currentLat, currentLon], 19); } 
            else { alert("Konum aranıyor, lütfen bekleyin..."); }
        }

        function toggleList() {
            var panel = document.getElementById("collapsible-area");
            var icon = document.getElementById("toggle-icon");
            if (panel.classList.contains("open")) {
                panel.classList.remove("open"); icon.className = "fas fa-chevron-down";
            } else {
                panel.classList.add("open"); icon.className = "fas fa-chevron-up";
            }
        }

        function saveCurrentLocation() {
            if (currentLat === null || currentLon === null || currentX === null) {
                alert("GPS bağlantısı bekleniyor..."); return;
            }
            var nameInput = document.getElementById("point-name");
            var pointName = nameInput.value.trim();
            if (pointName === "") {
                alert("Nokta adı girin!"); nameInput.focus(); return;
            }

            var id = pointIdCounter++;
            var marker = L.marker([currentLat, currentLon]).addTo(map)
                .bindPopup(`
                    <div style="font-family:'Poppins',sans-serif; text-align:center;">
                        <b style="font-size:14px; color:#0f172a;">${pointName}</b><br>
                        <span style="font-size:12px; color:#3b82f6;">DOM: ${currentDOM}</span><br>
                        <span style="font-size:12px;"><b>Y:</b> ${currentY.toFixed(3)}</span><br>
                        <span style="font-size:12px;"><b>X:</b> ${currentX.toFixed(3)}</span>
                    </div>
                `);
            pointMarkers[id] = marker;

            savedPoints.push({ 
                id: id, name: pointName, lat: currentLat, lon: currentLon, y_saga: currentY, x_yukari: currentX, dom: currentDOM 
            });
            
            nameInput.value = "";
            updateListUI();
        }

        function zoomToPoint(lat, lon) {
            map.setView([lat, lon], 19);
            toggleList();
        }

        function deletePoint(id) {
            if(pointMarkers[id]) { map.removeLayer(pointMarkers[id]); delete pointMarkers[id]; }
            savedPoints = savedPoints.filter(p => p.id !== id);
            updateListUI();
        }

        function updateListUI() {
            var listDiv = document.getElementById("points-list");
            document.getElementById("point-count").innerText = savedPoints.length;

            if (savedPoints.length === 0) {
                listDiv.innerHTML = '<div style="text-align:center; color:#94a3b8; font-size:0.85rem; padding: 20px 0;">Kayıtlı noktanız bulunmuyor.</div>';
                return;
            }

            listDiv.innerHTML = "";
            [...savedPoints].reverse().forEach(function(point) {
                listDiv.innerHTML += `
                    <div class="point-card">
                        <div class="point-info">
                            <h4><i class="fas fa-map-pin" style="color:var(--primary);"></i> ${point.name} <span class="dom-badge">DOM ${point.dom}</span></h4>
                            <p class="itrf-coords"><span>Y:</span> ${point.y_saga.toFixed(3)}</p>
                            <p class="itrf-coords"><span>X:</span> ${point.x_yukari.toFixed(3)}</p>
                            <p class="wgs-coords">E: ${point.lat.toFixed(5)} / B: ${point.lon.toFixed(5)}</p>
                        </div>
                        <div class="point-actions">
                            <button class="btn-icon btn-go" onclick="zoomToPoint(${point.lat}, ${point.lon})"><i class="fas fa-crosshairs"></i></button>
                            <button class="btn-icon btn-del" onclick="deletePoint(${point.id})"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
